<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Seyahat Haritam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e14;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --border: rgba(255,255,255,0.07);
  --accent: #c8a96e;
  --accent2: #e8c990;
  --visited: #c8a96e;
  --unvisited: #2a2a3a;
  --unvisited-stroke: #3a3a50;
  --text: #f0ece4;
  --text-muted: rgba(240,236,228,0.45);
  --text-soft: rgba(240,236,228,0.7);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* HEADER */
.header {
  padding: 20px 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--accent2);
  letter-spacing: 0.3px;
}
.header-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
  font-weight: 300;
}
.stats-pill {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  text-align: right;
}
.stats-num {
  font-size: 18px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
}
.stats-lbl {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* MAP */
.map-section {
  padding: 16px 12px 8px;
  position: relative;
}
.map-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}
#turkey-map {
  width: 100%;
  height: auto;
  display: block;
}
.il-path {
  stroke: var(--bg);
  stroke-width: 0.8;
  cursor: pointer;
  transition: opacity 0.2s, filter 0.2s;
}
.il-path.visited {
  fill: var(--visited);
}
.il-path.visited:active {
  opacity: 0.7;
}
.il-path.unvisited {
  fill: var(--unvisited);
  stroke: var(--unvisited-stroke);
}
.map-legend {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 8px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
}

/* CITY LIST */
.section-title {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  padding: 16px 20px 8px;
  text-transform: uppercase;
}
.city-list {
  padding: 0 12px 100px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.city-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.city-card:active { background: var(--surface2); }
.city-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.city-info { flex: 1; min-width: 0; }
.city-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.city-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}
.city-chevron {
  color: var(--accent);
  font-size: 18px;
  opacity: 0.6;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-overlay.open { display: block; }
.modal {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}
.modal-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 10;
}
.modal-back {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--text);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.modal-city-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--accent2);
}
.modal-photo-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
}
.modal-body { padding: 16px; flex: 1; }
.photo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.photo-item {
  border-radius: 10px;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--surface2);
  cursor: pointer;
}
.photo-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.2s;
}
.photo-item:first-child {
  grid-column: span 2;
  aspect-ratio: 16/9;
}
.drive-link-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 16px 0 0;
  padding: 14px;
  background: var(--surface);
  border: 0.5px solid var(--accent);
  border-radius: 12px;
  color: var(--accent);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 100%;
  max-height: 100vh;
  object-fit: contain;
}
.lightbox-close {
  position: fixed;
  top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  color: #fff;
  cursor: pointer;
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 14px;
}

/* NO VISITED */
.no-visited {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Seyahat Haritam</div>
    <div class="header-sub">Türkiye gezileri</div>
  </div>
  <div class="stats-pill">
    <div class="stats-num" id="visited-count">0</div>
    <div class="stats-lbl">il gezildi</div>
  </div>
</div>

<div class="map-section">
  <div class="map-hint">Gezilen illere tıkla</div>
  <svg id="turkey-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
    <!-- Türkiye illeri SVG - basitleştirilmiş -->
    <g id="iller"></g>
  </svg>
  <div class="map-legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--visited)"></div>
      Gezdim
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--unvisited); border: 1px solid var(--unvisited-stroke)"></div>
      Gitmedim
    </div>
  </div>
</div>

<div class="section-title">Gezilen İller</div>
<div class="city-list" id="city-list"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-back" onclick="closeModal()">‹</div>
      <div class="modal-city-name" id="modal-city-name"></div>
      <div class="modal-photo-count" id="modal-photo-count"></div>
    </div>
    <div class="modal-body">
      <div class="photo-grid" id="photo-grid"></div>
      <a class="drive-link-btn" id="drive-link" href="#" target="_blank">
        📁 Tüm fotoğrafları Drive'da gör
      </a>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close">×</div>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// =============================================
// VERİ DOSYASI - data.js'den yüklenir
// =============================================
// data.js ayrı bir dosya olarak yüklenecek
</script>
<script src="data.js"></script>
<script>
// =============================================
// TÜRKIYE SVG HARİTASI
// =============================================
// Basitleştirilmiş il koordinatları (merkez noktaları)
const ilMerkezleri = {
  "İstanbul":    {x:120, y:120}, "Tekirdağ":    {x:80,  y:130}, "Edirne":      {x:55,  y:105},
  "Kırklareli":  {x:100, y:100}, "Çanakkale":   {x:90,  y:170}, "Balıkesir":   {x:135, y:190},
  "İzmir":       {x:110, y:230}, "Manisa":      {x:140, y:215}, "Bursa":       {x:170, y:155},
  "Kocaeli":     {x:185, y:130}, "Sakarya":     {x:210, y:130}, "Düzce":       {x:235, y:120},
  "Bolu":        {x:260, y:125}, "Yalova":      {x:175, y:155}, "Bilecik":     {x:200, y:155},
  "Eskişehir":   {x:235, y:175}, "Kütahya":     {x:190, y:195}, "Uşak":        {x:175, y:225},
  "Denizli":     {x:175, y:265}, "Aydın":       {x:140, y:260}, "Muğla":       {x:155, y:295},
  "Antalya":     {x:215, y:320}, "Isparta":     {x:210, y:280}, "Burdur":      {x:195, y:285},
  "Afyonkarahisar":{x:210, y:230}, "Konya":     {x:270, y:275}, "Karaman":    {x:295, y:300},
  "Ankara":      {x:295, y:185}, "Çankırı":     {x:310, y:155}, "Kastamonu":   {x:320, y:120},
  "Bartın":      {x:295, y:108}, "Zonguldak":   {x:270, y:108}, "Karabük":     {x:300, y:120},
  "Sinop":       {x:360, y:100}, "Samsun":      {x:415, y:105}, "Ordu":        {x:465, y:110},
  "Giresun":     {x:498, y:115}, "Trabzon":     {x:540, y:108}, "Rize":        {x:575, y:105},
  "Artvin":      {x:605, y:108}, "Ardahan":     {x:635, y:120}, "Kars":        {x:660, y:140},
  "Ağrı":        {x:680, y:165}, "Iğdır":       {x:700, y:170}, "Van":         {x:675, y:210},
  "Bitlis":      {x:645, y:215}, "Muş":         {x:620, y:205}, "Bingöl":      {x:580, y:195},
  "Tunceli":     {x:560, y:190}, "Elazığ":      {x:555, y:205}, "Malatya":     {x:520, y:210},
  "Erzurum":     {x:625, y:160}, "Erzincan":    {x:570, y:170}, "Bayburt":     {x:560, y:140},
  "Gümüşhane":   {x:535, y:135}, "Trabzon":     {x:540, y:108},
  "Sivas":       {x:480, y:190}, "Tokat":       {x:440, y:155}, "Amasya":      {x:400, y:140},
  "Çorum":       {x:370, y:145}, "Yozgat":      {x:390, y:190}, "Kırşehir":    {x:345, y:205},
  "Nevşehir":    {x:350, y:235}, "Kayseri":     {x:395, y:240}, "Niğde":       {x:360, y:265},
  "Aksaray":     {x:320, y:255}, "Kırıkkale":   {x:325, y:175},
  "Adana":       {x:365, y:320}, "Mersin":      {x:330, y:330}, "Osmaniye":    {x:390, y:315},
  "Hatay":       {x:390, y:345}, "Kahramanmaraş":{x:430, y:295}, "Adıyaman":   {x:460, y:295},
  "Gaziantep":   {x:435, y:330}, "Kilis":       {x:420, y:345}, "Şanlıurfa":   {x:480, y:335},
  "Diyarbakır":  {x:545, y:275}, "Mardin":      {x:565, y:305}, "Siirt":       {x:610, y:275},
  "Batman":      {x:585, y:270}, "Şırnak":      {x:630, y:285}, "Hakkari":     {x:670, y:250},
  "Mus":         {x:620, y:200},
};

// SVG'ye yuvarlak il noktaları çiz
function haritaCiz() {
  const svg = document.getElementById('turkey-map');
  const g = document.getElementById('iller');
  
  Object.entries(ilMerkezleri).forEach(([il, pos]) => {
    const gezildi = DATA.iller[il] !== undefined;
    
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pos.x * 1.0);
    circle.setAttribute('cy', pos.y * 1.0);
    circle.setAttribute('r', gezildi ? 11 : 7);
    circle.setAttribute('class', 'il-path ' + (gezildi ? 'visited' : 'unvisited'));
    
    if (gezildi) {
      circle.style.cursor = 'pointer';
      circle.addEventListener('click', () => sehirAc(il));
    }
    g.appendChild(circle);

    // İl adı (sadece gezilenlerde)
    if (gezildi) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', pos.x);
      text.setAttribute('y', pos.y + 22);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('font-size', '8');
      text.setAttribute('fill', 'rgba(200,169,110,0.8)');
      text.setAttribute('font-family', 'DM Sans, sans-serif');
      text.textContent = il;
      g.appendChild(text);
    }
  });
}

// =============================================
// ŞEHIR LİSTESİ
// =============================================
function listeCiz() {
  const container = document.getElementById('city-list');
  const gezilen = Object.entries(DATA.iller);
  
  document.getElementById('visited-count').textContent = gezilen.length;

  if (gezilen.length === 0) {
    container.innerHTML = '<div class="no-visited">Henüz gezilen il eklenmemiş.<br>data.js dosyasını düzenle.</div>';
    return;
  }

  container.innerHTML = gezilen.map(([il, bilgi]) => `
    <div class="city-card" onclick="sehirAc('${il}')">
      <div class="city-icon">${bilgi.emoji || '📍'}</div>
      <div class="city-info">
        <div class="city-name">${il}</div>
        <div class="city-meta">${bilgi.fotograflar.length} fotoğraf${bilgi.yil ? ' · ' + bilgi.yil : ''}</div>
      </div>
      <div class="city-chevron">›</div>
    </div>
  `).join('');
}

// =============================================
// MODAL
// =============================================
function sehirAc(il) {
  const bilgi = DATA.iller[il];
  if (!bilgi) return;

  document.getElementById('modal-city-name').textContent = il;
  document.getElementById('modal-photo-count').textContent = bilgi.fotograflar.length + ' fotoğraf';
  
  const driveLink = document.getElementById('drive-link');
  if (bilgi.drive_klasor) {
    driveLink.href = bilgi.drive_klasor;
    driveLink.style.display = 'flex';
  } else {
    driveLink.style.display = 'none';
  }

  const grid = document.getElementById('photo-grid');
  if (bilgi.fotograflar.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:span 2">Fotoğraf eklenmemiş</div>';
  } else {
    grid.innerHTML = bilgi.fotograflar.map((foto, i) => `
      <div class="photo-item" onclick="lightboxAc('${foto.url}')">
        <img src="${foto.url}" alt="${il} ${i+1}" loading="lazy" onerror="this.style.opacity='0.2'">
      </div>
    `).join('');
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// =============================================
// LIGHTBOX
// =============================================
function lightboxAc(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// =============================================
// BAŞLAT
// =============================================
haritaCiz();
listeCiz();
</script>
</body>
</html>
